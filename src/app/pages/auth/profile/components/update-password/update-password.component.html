<ng-container *ngIf="vm$ | async as vm">
  <h3 class="text-lg font-semibold text-gray-800 mb-6">Modifier mon mot de passe</h3>
  <form [formGroup]="form" (ngSubmit)="onSumbit()" class="bg-white shadow-md px-6 py-8 rounded-md">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-6">
      <app-input
        type="password"
        name="old_password"
        label="Ancien mot de passe"
        placeholder="Entrez l'ancien mot de passe"
        [validationErrors]="vm.errors" />
      <app-input
        type="password"
        name="password"
        label="Nouveau mot de passe"
        placeholder="Entrez le nouveau mot de passe"
        [validationErrors]="vm.errors" />
      <app-input
        type="password"
        name="password_confirm"
        label="Confirmation du mot de passe"
        placeholder="Confirmez votre mot de passe"
        [validationErrors]="vm.errors" />
    </div>
    <div class="w-1/2 md:w-1/4 mt-8">
      <app-button type="submit" [loading]="vm.isLoading" [disabled]="form.invalid">Changer</app-button>
    </div>
  </form>
</ng-container>
