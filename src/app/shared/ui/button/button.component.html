<button
  class="inline-flex text-white w-full justify-center items-center gap-4 px-4 py-2 font-semibold leading-6 text-sm shadow rounded-md bg-sky-500 hover:bg-sky-600 transition ease-in-out duration-150 disabled:bg-sky-600/40 disabled:text-white disabled:cursor-not-allowed"
  [disabled]="loading() || disabled()"
  [type]="type()">
  @if (loading()) {
  <app-spinner />
  } @else {
  <ng-content />
  }
</button>
