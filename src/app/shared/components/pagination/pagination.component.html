@if (type() === 'default') {
<button
  [disabled]="disablePrev()"
  (click)="onPrevClick()"
  class="disabled:opacity-0 transition-opacity duration-150 text-center py-1.5 px-2.5 absolute top-1/2 -left-4 shadow-lg p-2 rounded-full bg-sky-900">
  <i class="bi bi-arrow-left h-4 w-4 text-white"></i>
</button>

<button
  [disabled]="disableNext()"
  (click)="onNextClick()"
  class="disabled:opacity-0 transition-opacity duration-150 text-center py-1.5 px-2.5 absolute top-1/2 -right-4 shadow-lg p-2 rounded-full bg-sky-900 cursor-pointer">
  <i class="bi bi-arrow-right h-4 w-4 text-white"></i>
</button>
} @else {
<button
  [disabled]="disablePrev()"
  (click)="onPrevClick()"
  class="disabled:opacity-0 transition-opacity duration-150 text-center text-white bg-sky-800 rounded-md px-6 py-2 justify-center gap-1">
  <i class="bi bi-chevron-double-left w-3 h-3"></i>
  Précédent
</button>
<button
  [disabled]="disableNext()"
  (click)="onNextClick()"
  class="disabled:opacity-0 transition-opacity duration-150 text-center text-white bg-sky-800 rounded-md px-6 py-2 justify-center gap-1">
  Suivant
  <i class="bi bi-chevron-double-right w-3 h-3 fill-current"></i>
</button>
}
